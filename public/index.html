<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence Baseball — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, ui-monospace, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border: 1px solid #30363d;
      background: #161b22;
      border-radius: 8px;
      padding: 48px 56px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #c9d1d9;
      margin-bottom: 12px;
    }

    p {
      font-size: 0.82rem;
      color: #8b949e;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 28px 0;
    }

    .tag {
      display: inline-block;
      font-size: 0.72rem;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Sequence⚾</div>
    <h1>Coming Soon</h1>
    <p>Advanced Phillies stats and analysis — PAR grades, pitch sequences, steal grades, and more.</p>
    <hr class="divider">
    <span class="tag">Under Construction</span>
  </div>
</body>
</html>
