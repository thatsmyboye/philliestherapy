name: Deploy to Pebblehost via SFTP

on:
  push:
    branches:
      - main
      - master
    paths:
      - "projects/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          cat > projects/phillies-bot/.env <<'EOF'
          DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
          ALERTS_CHANNEL_ID=${{ secrets.ALERTS_CHANNEL_ID }}
          SP_GRADER_CHANNEL_ID=${{ secrets.SP_GRADER_CHANNEL_ID }}
          PROPS_CHANNEL_ID=${{ secrets.PROPS_CHANNEL_ID }}
          BINGO_CHANNEL_ID=${{ secrets.BINGO_CHANNEL_ID }}
          OTHER_BINGO_CHANNEL_ID=${{ secrets.OTHER_BINGO_CHANNEL_ID }}
          EOF
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^[[:space:]]*//' projects/phillies-bot/.env

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.PEBBLEHOST_SFTP_PASSWORD }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u 'paul.t.boye@gmail.com.da213d9e',':','${SFTP_PASSWORD}','@',sftp://na1660.pebblehost.net:2222;
            mirror --reverse --delete --verbose \
              projects/phillies-bot/ \
              /projects/phillies-bot/;
            bye
          "
