name: Deploy to Pebblehost via SFTP

on:
  push:
    branches:
      - main
      - master
    paths:
      - "projects/phillies-bot/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.PEBBLEHOST_SFTP_PASSWORD }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open sftp://paul.t.boye@gmail.com.da213d9e:${SFTP_PASSWORD}@na1660.pebblehost.net:2222;
            mirror --reverse --delete --verbose \
              projects/phillies-bot/ \
              projects/phillies-bot/;
            bye
          "
